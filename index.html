<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Volvo OBD Console (XC70 P3) v0.4.2</title>
<style>
  :root{
    --bg:#0d1117;--panel:#161b22;--line:#30363d;--txt:#e6edf3;--dim:#8b949e;
    --acc:#2f81f7;--ok:#3fb950;--err:#f85149;--warn:#d29922;--tx:#58a6ff;--rx:#7ee787;--inc:#d29922;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
  body{display:flex;flex-direction:column;height:100dvh}
  header{padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  header h1{font-size:14px;margin:0;font-weight:600}
  .status{font-size:12px;padding:2px 8px;border-radius:10px;border:1px solid var(--line);color:var(--dim)}
  .status.on{color:var(--ok);border-color:var(--ok)}
  .status.err{color:var(--err);border-color:var(--err)}
  .status.warn{color:var(--warn);border-color:var(--warn)}
  button{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:6px;padding:8px 10px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  button:active{background:#21262d}
  button.primary{background:var(--acc);border-color:var(--acc);color:#fff}
  button.macro{background:#1c2431;border-color:#2b3a52;color:var(--tx)}
  button:disabled{opacity:.35}
  .bar{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap;background:var(--panel);border-bottom:1px solid var(--line)}
  .bar small{width:100%;color:var(--dim);font-size:11px;margin-bottom:2px}
  #verdict{padding:0 12px}
  #verdict .v{margin:8px 0;padding:10px 12px;border-radius:8px;border:1px solid var(--line);font-size:13px}
  #verdict .v.PASS{border-color:var(--ok);background:#0f2417}
  #verdict .v.FAIL{border-color:var(--err);background:#2a1414}
  #verdict .v.INCONCLUSIVE{border-color:var(--inc);background:#2a2413}
  #verdict .v b{font-size:14px}
  #log{flex:1;overflow-y:auto;padding:10px 12px;font-family:var(--mono);font-size:12.5px;
    line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .l{display:block}
  .l .t{color:var(--dim)}
  .l.tx .d{color:var(--tx)} .l.rx .d{color:var(--rx)} .l.resp .d{color:#c9d1d9}
  .l.sys .d{color:var(--warn)} .l.er .d{color:var(--err)}
  footer{display:flex;gap:6px;padding:8px 12px;background:var(--panel);border-top:1px solid var(--line)}
  #cmd{flex:1;background:var(--bg);color:var(--txt);border:1px solid var(--line);
    border-radius:6px;padding:10px;font-family:var(--mono);font-size:14px}
  .row{display:flex;gap:6px;align-items:center;width:100%}
  .toggles{display:flex;gap:10px;padding:6px 12px;background:var(--panel);
    border-bottom:1px solid var(--line);font-size:12px;color:var(--dim);flex-wrap:wrap;align-items:center}
  .toggles label{display:flex;gap:4px;align-items:center;cursor:pointer}
  .toggles input[type=text]{background:var(--bg);color:var(--txt);border:1px solid var(--line);
    border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:11px;width:170px}
  a.dl,button.mini{color:var(--acc);text-decoration:none;font-size:11px;background:none;border:none;padding:2px 4px;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>🔧 Volvo OBD Console <span style="color:var(--dim);font-weight:400">v0.4.2</span></h1>
  <span id="st" class="status">rozłączony</span>
  <span id="dev" class="status" style="display:none"></span>
  <span id="logstate" class="status" style="display:none"></span>
  <button id="btnConn" class="primary">Połącz</button>
  <button id="btnDisc" disabled>Rozłącz</button>
</header>

<div class="bar">
  <small>MAKRA — aktywne po połączeniu; każde kończy się werdyktem PASS / FAIL / INCONCLUSIVE</small>
  <button class="macro" data-macro="A" disabled>A · Setup</button>
  <button class="macro" data-macro="B" disabled>B · Test 11-bit</button>
  <button class="macro" data-macro="C" disabled>C · Test 29-bit ⭐</button>
  <button class="macro" data-macro="X" disabled>Cross-check</button>
  <button class="macro" data-macro="Z" disabled>Cleanup</button>
</div>

<div id="verdict"></div>

<div class="toggles">
  <label><input type="checkbox" id="cr" checked> CR</label>
  <label><input type="checkbox" id="autoscroll" checked> scroll</label>
  <label><input type="checkbox" id="hexview"> HEX RX</label>
  <label title="EKSPERYMENTALNY — adres/serwis/PID NIEpotwierdzone dla XC70 T6. Serwis musi być A6 lub AE.">
    Volvo payload (exp):<input type="text" id="req29" placeholder="8 bajtów hex — tylko zweryfikowany payload"></label>
  <span style="flex:1"></span>
  <span id="sesslabel" style="font-size:11px">sesja: —</span>
  <button class="mini" id="btnNewSess">nowa sesja</button>
  <a class="dl" id="dlLog" href="#">⬇ eksport sesji</a>
  <button class="mini" id="btnDelSess">usuń sesję</button>
  <button class="mini" id="btnClear">wyczyść widok</button>
</div>

<div id="log"></div>

<footer>
  <div class="row">
    <input id="cmd" placeholder="komenda np. 0100  lub  ATSH 0F FF FE" autocomplete="off" autocapitalize="characters" spellcheck="false">
    <button id="btnSend" class="primary" disabled>Wyślij</button>
  </div>
</footer>

<script>
"use strict";
/* ============================================================================
   Volvo XC70 P3 — Web Bluetooth ELM327 console  v0.4.2
   Poprawki po audytach v0.3–v0.4.2:
   1 session UUID + eksport jednej sesji  2 TX i RX jako transport_chunk
   3 wspólny sequence number  4 stan adaptera zatwierdzany po OK
   5 reset stanu po ATZ/ATD/reconnect  6 NEGATIVE_RESPONSE + dekod NRC
   7 makra wyłączone bez połączenia  8 evaluatory odporne na puste wyniki
   9 cleanup bez bezwarunkowego PASS  10 makra atomowe (blokada ręcznego wysyłania)
   11 parser nagłówka 11/29-bit ze spacjami i bez  12 status AT_COMMAND_SUPPORTED
      != potwierdzenie transmisji CAN (rozdzielone werdykty 29-bit)
   13 walidacja 8 bajtów + allowlist serwisu (A6/AE) przed requestem Volvo
   14 reset filtrów przed discovery 29-bit; PASS wymaga korelacji request-response
   15 profile znanych adapterów BLE + fallback heurystyczny (oznaczony)
   16 obsługa błędów/quota IndexedDB (LOG_DEGRADED) + flush przed eksportem
   17 exchange domykany przy disconnect  18 bezpieczne usuwanie sesji
   Web Bluetooth nie udostępnia MTU → chunk=CHUNK. Zegar monotoniczny + UTC.
   ============================================================================ */

const $ = s => document.querySelector(s);
const logEl=$('#log'), verdictEl=$('#verdict');
const enc=new TextEncoder(), dec=new TextDecoder();
const APP_VERSION='0.4.2', CHUNK=20, DOM_MAX=500;

// ---- BLE ----
let device=null, server=null, writeChar=null, notifyChar=null, svcUuid=null, adapterProfile='(none)';
// ---- sesja / sekwencja ----
let sessionId=null, seq=0, sessionStartedWall=null, sessionStartedMono=null;
const uuid=()=> (crypto.randomUUID? crypto.randomUUID()
  : 'sess-'+Math.random().toString(16).slice(2)+'-'+performance.now().toFixed(0));
// ---- stan adaptera: żądany vs potwierdzony ----
let requestedState={protocol:null,header:null,cra:null,caf:null};
let confirmedState ={protocol:null,header:null,cra:null,caf:null};
function resetAdapterState(){ requestedState={protocol:null,header:null,cra:null,caf:null};
  confirmedState={protocol:null,header:null,cra:null,caf:null}; }
// ---- log health ----
let logErrors=0, logDegraded=false;

const t0=performance.now();
const mono=()=>performance.now()-t0;
const wall=()=>new Date().toISOString();
function hhmmss(){const d=new Date();return d.toLocaleTimeString('pl-PL',{hour12:false})+'.'+String(d.getMilliseconds()).padStart(3,'0');}

/* ---------------- IndexedDB ---------------- */
let db=null, pendingWrites=new Set();
function idbOpen(){return new Promise(res=>{try{
  const rq=indexedDB.open('volvo_obd_log',2);
  rq.onupgradeneeded=e=>{const d=e.target.result;
    for(const s of ['chunk','exchange']) if(!d.objectStoreNames.contains(s)){
      const st=d.createObjectStore(s,{autoIncrement:true}); st.createIndex('session','session',{unique:false});
    }};
  rq.onsuccess=e=>{db=e.target.result; res(true);};
  rq.onerror=()=>{db=null; res(false);};
}catch(e){db=null;res(false);}});}
function idbPut(store,obj){
  if(!db) return Promise.resolve(false);
  let finish;
  const done=new Promise(resolve=>{ finish=resolve; });
  pendingWrites.add(done);
  let settled=false;
  const settle=ok=>{ if(settled) return; settled=true; finish(ok); };
  try{
    const tx=db.transaction(store,'readwrite');
    tx.oncomplete=()=>settle(true);
    tx.onerror=tx.onabort=()=>{ flagLogError(); settle(false); };
    tx.objectStore(store).add(obj);
  }catch(e){ flagLogError(); settle(false); }
  done.then(()=>pendingWrites.delete(done));
  return done;
}
async function flushWrites(){
  while(pendingWrites.size) await Promise.all([...pendingWrites]);
}
function flagLogError(){ logErrors++; if(!logDegraded && logErrors>=3){ logDegraded=true;
  setLogState('LOG_DEGRADED','warn'); errline('⚠ IndexedDB: utrata zapisu (quota/tx). Log może być niepełny.'); } }
async function idbAllBySession(store,sid){return new Promise(res=>{
  if(!db){res([]);return;}
  try{const tx=db.transaction(store,'readonly');const rq=tx.objectStore(store).index('session').getAll(IDBKeyRange.only(sid));
    rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]);}catch(e){res([]);}});}
async function idbDeleteSession(sid){for(const store of ['chunk','exchange']){await new Promise(r=>{
  try{const tx=db.transaction(store,'readwrite');const idx=tx.objectStore(store).index('session');
    const rq=idx.openCursor(IDBKeyRange.only(sid));
    rq.onsuccess=e=>{const c=e.target.result; if(c){ c.delete(); c.continue(); } else r(); };
    rq.onerror=()=>r();}catch(e){r();}});}}

/* ---------------- widok (ring buffer) ---------------- */
function view(kind,dir,text){
  const div=document.createElement('span'); div.className='l '+kind;
  div.innerHTML=`<span class="t">${hhmmss()} ${dir}</span> <span class="d"></span>`;
  div.querySelector('.d').textContent=text; logEl.appendChild(div);
  while(logEl.childElementCount>DOM_MAX) logEl.removeChild(logEl.firstChild);
  if($('#autoscroll').checked) logEl.scrollTop=logEl.scrollHeight;
}
function sys(t){ view('sys','··',t); idbPut('exchange',{session:sessionId,seq:++seq,lvl:'SYS',ts_mono:mono(),ts_wall:wall(),text:t}); }
function errline(t){ view('er','!!',t); idbPut('exchange',{session:sessionId,seq:++seq,lvl:'ERR',ts_mono:mono(),ts_wall:wall(),text:t}); }

/* ---------------- transport_chunk (TX i RX) — sesja związana z exchange ---------------- */
function logChunk(dir,bytes,txt,exId,frag,sess){
  const hex=[...bytes].map(b=>b.toString(16).padStart(2,'0')).join(' ');
  idbPut('chunk',{session:sess||sessionId,seq:++seq,ts_mono:mono(),ts_wall:wall(),
    dir,transport:'ble',exchange_id:exId??null,frag:frag??null,bytes_hex:hex,text:txt});
  if(dir==='RX'){ const shown=$('#hexview').checked?(txt.replace(/\r/g,'⏎')+'  ['+hex+']'):txt.replace(/\r/g,'⏎'); view('rx','RX',shown); }
}
function logExchange(ex){
  idbPut('exchange',{session:ex.session||sessionId,seq:++seq,lvl:'EXCHANGE',exchange_id:ex.id,
    ts_mono_start:ex.tStart,ts_mono_end:mono(),ts_wall:wall(),
    command:ex.cmd,response_text:ex.text,status:ex.status,
    adapter_state:JSON.stringify(confirmedState)});
}

/* ---------------- klasyfikacja odpowiedzi ---------------- */
const NRC={0x10:'generalReject',0x11:'serviceNotSupported',0x12:'subFuncNotSupported',
  0x13:'wrongLength',0x22:'conditionsNotCorrect',0x31:'requestOutOfRange',
  0x33:'securityAccessDenied',0x35:'invalidKey',0x78:'responsePending'};
function classify(text){
  const u=(text||'').toUpperCase();
  if(u.includes('?')) return {status:'AT_UNSUPPORTED'};
  if(u.includes('UNABLE TO CONNECT')) return {status:'NO_CONNECT'};
  if(u.includes('NO DATA')) return {status:'NO_DATA'};
  if(u.includes('BUFFER FULL')) return {status:'BUFFER_FULL'};
  if(u.includes('CAN ERROR')||u.includes('BUS ERROR')||u.includes('RX ERROR')) return {status:'BUS_ERROR'};
  if(u.includes('STOPPED')) return {status:'STOPPED'};
  // UDS/KWP negative response: 7F <service> <nrc>
  const neg=u.replace(/[>\r\n]/g,' ').match(/\b7F\s*([0-9A-F]{2})\s*([0-9A-F]{2})\b/);
  if(neg){ const nrc=parseInt(neg[2],16); return {status:'NEGATIVE_RESPONSE',service:neg[1],nrc:neg[2],nrcName:NRC[nrc]||'?'}; }
  if(u.includes('ERROR')) return {status:'ERROR'};
  // P2 (znane ograniczenie): OK_DATA to heurystyka tekstowa. Produkcyjny werdykt protokołu
  // musi opierać się na parserze framingu i zgodności request/response, nie na regexie hex.
  if(/[0-9A-F]{2}(\s|\r|>|$)/.test(u)) return {status:'OK_DATA'};
  if(u.includes('OK')) return {status:'OK'};
  return {status:'OK'};
}
// nagłówek 29-bit: 8 hex pod rząd LUB 4 bajty rozdzielone spacją, na starcie linii
function parseExtFrames(text){
  const frames=[];
  for(const raw of (text||'').split(/[\r\n]+/)){
    const s=raw.replace(/>/g,'').trim(); if(!s) continue;
    let id=null, rest='';
    const compact=s.match(/^([0-9A-Fa-f]{8})\s+(.+)$/);
    if(compact){ id=compact[1].toUpperCase(); rest=compact[2]; }
    else{
      const toks=s.split(/\s+/);
      if(toks.length>=7 && toks.slice(0,4).every(t=>/^[0-9A-Fa-f]{2}$/.test(t))){
        id=toks.slice(0,4).join('').toUpperCase(); rest=toks.slice(4).join(' ');
      }
    }
    if(!id) continue;
    const payload=rest.split(/\s+/).filter(t=>/^[0-9A-Fa-f]{2}$/.test(t)).map(t=>t.toUpperCase());
    frames.push({canId:id,payload,raw:s});
  }
  return frames;
}
function matchVolvoResponse(text,p,meta){
  const frames=parseExtFrames(text);
  const positiveService=((parseInt(p.service,16)+0x40)&0xFF).toString(16).padStart(2,'0').toUpperCase();
  // HYPOTHESIS dla XC70: odpowiedź ma [byte0, address, request-service+0x40, ...].
  // Korelacja nie waliduje jeszcze response CAN ID dla P3; obserwowany ID zapisujemy w detalu werdyktu.
  const positive=frames.find(f=>f.payload.length>=3 && f.payload[1]===p.addr && f.payload[2]===positiveService);
  const negative=meta&&meta.status==='NEGATIVE_RESPONSE'&&meta.service===p.service&&frames.length>0;
  return {frames,positive,negative};
}

/* ---------------- kolejka: jedno żądanie naraz ---------------- */
let queue=[], inflight=null, rxBuf='', promptTimer=null;
function enqueue(cmd,timeoutMs=2500){return new Promise(resolve=>{
  queue.push({cmd,timeoutMs,resolve,session:sessionId}); pump();  // sesja związana z exchange w chwili kolejkowania
  refreshControls();
});}
async function pump(){
  if(inflight||queue.length===0||!writeChar) return;
  inflight=queue.shift(); inflight.id=++seq; inflight.tStart=mono(); rxBuf=''; refreshControls();
  promptTimer=setTimeout(()=>{ const ex=inflight; inflight=null; promptTimer=null;
    ex.text=rxBuf; ex.status='TIMEOUT'; rxBuf='';
    view('resp','⟵',`[TIMEOUT] ${ex.cmd}`); logExchange(ex);
    ex.resolve({cmd:ex.cmd,text:ex.text,status:'TIMEOUT'}); refreshControls(); pump();
  }, inflight.timeoutMs);
  try{
    setRequestedState(inflight.cmd);
    await writeBytes(inflight.cmd+($('#cr').checked?'\r':''), inflight.id, inflight.session);
    view('tx','TX',inflight.cmd);
  }catch(e){ clearTimeout(promptTimer); promptTimer=null;
    const ex=inflight; inflight=null; ex.status='WRITE_ERROR'; ex.text=String(e.message||e);
    errline('write error: '+ex.text); logExchange(ex);
    ex.resolve({cmd:ex.cmd,text:ex.text,status:'WRITE_ERROR'}); refreshControls(); pump(); }
}
function onNotify(ev){
  const dv=ev.target.value;
  const bytes=new Uint8Array(dv.buffer,dv.byteOffset,dv.byteLength); const txt=dec.decode(bytes);
  logChunk('RX',bytes,txt, inflight?inflight.id:null, null, inflight?inflight.session:sessionId);
  if(!inflight) return;
  rxBuf+=txt;
  if(rxBuf.includes('>')){
    clearTimeout(promptTimer); promptTimer=null;
    const full=rxBuf; rxBuf=''; const ex=inflight; inflight=null;
    const c=classify(full); ex.text=full; ex.status=c.status; ex.meta=c;
    confirmStateOn(ex);                                  // stan potwierdzany PO odpowiedzi
    const extra=c.status==='NEGATIVE_RESPONSE'?` (7F ${c.service} ${c.nrc} ${c.nrcName})`:'';
    view('resp','⟵',`[${ex.status}${extra}] ${full.replace(/[\r>]/g,' ').trim()}`);
    logExchange(ex);
    ex.resolve({cmd:ex.cmd,text:full,status:ex.status,meta:c}); refreshControls(); pump();
  }
}
/* stan adaptera: żądany na wysyłce, potwierdzony dopiero po OK; ATZ/ATD zeruje */
function setRequestedState(cmd){
  const u=cmd.toUpperCase().replace(/\s+/g,'');
  if(u.startsWith('ATSP')) requestedState.protocol=u.slice(4);
  else if(u.startsWith('ATSH')) requestedState.header=cmd.slice(4).trim();
  else if(u.startsWith('ATCRA')) requestedState.cra=cmd.slice(5).trim()||'(reset)';
  else if(u.startsWith('ATCAF')) requestedState.caf=u.slice(5);
}
function confirmStateOn(ex){
  const u=ex.cmd.toUpperCase().replace(/\s+/g,'');
  if(u==='ATZ'||u.startsWith('ATD')){ resetAdapterState(); return; }
  if(!(ex.status==='OK'||ex.status==='OK_DATA')) return;   // tylko po sukcesie
  if(u.startsWith('ATSP')) confirmedState.protocol=requestedState.protocol;
  else if(u.startsWith('ATSH')) confirmedState.header=requestedState.header;
  else if(u.startsWith('ATCRA')) confirmedState.cra=requestedState.cra;
  else if(u.startsWith('ATCAF')) confirmedState.caf=requestedState.caf;
}
async function writeBytes(str,exId,sess){
  const bytes=enc.encode(str);
  let frag=0;
  for(let i=0;i<bytes.length;i+=CHUNK){
    const c=bytes.slice(i,i+CHUNK);
    logChunk('TX',c,dec.decode(c),exId,frag++,sess);      // TX też jako transport_chunk, do właściwej sesji
    if(writeChar.properties.writeWithoutResponse) await writeChar.writeValueWithoutResponse(c);
    else await writeChar.writeValue(c);
  }
}

/* ---------------- profile adapterów + connect ---------------- */
const ADAPTER_PROFILES=[
  {name:'FFF0 (fff2 w/fff1 n)', service:'0000fff0-0000-1000-8000-00805f9b34fb',
    write:'0000fff2-0000-1000-8000-00805f9b34fb', notify:'0000fff1-0000-1000-8000-00805f9b34fb'},
  {name:'FFE0 (ffe1 shared)', service:'0000ffe0-0000-1000-8000-00805f9b34fb',
    write:'0000ffe1-0000-1000-8000-00805f9b34fb', notify:'0000ffe1-0000-1000-8000-00805f9b34fb'},
];
const KNOWN_SVC=[0xFFF0,0xFFE0,0xFFE5,...ADAPTER_PROFILES.map(p=>p.service),
  'e7810a71-73ae-499d-8c15-faa9aef0c3f2'];
async function pickChars(server){
  const services=await server.getPrimaryServices();
  // 1) spróbuj dopasować znany profil (exact UUID)
  for(const p of ADAPTER_PROFILES){
    const svc=services.find(s=>s.uuid===p.service); if(!svc) continue;
    try{ const w=await svc.getCharacteristic(p.write); const n=await svc.getCharacteristic(p.notify);
      return {w,n,svc,profile:p.name}; }catch(e){}
  }
  // 2) fallback heurystyczny: write+notify z jednego serwisu (oznaczony)
  for(const svc of services){ const chars=await svc.getCharacteristics(); let w=null,n=null;
    for(const ch of chars){ const pr=ch.properties;
      if(!n&&(pr.notify||pr.indicate)) n=ch; if(!w&&(pr.write||pr.writeWithoutResponse)) w=ch; }
    if(w&&n) return {w,n,svc,profile:'HEURYSTYKA (eksperymentalny)'}; }
  return null;
}
async function connect(){
  if(!navigator.bluetooth){ errline('navigator.bluetooth niedostępny. Android→Chrome, iOS→Bluefy, https wymagane.'); return; }
  try{
    setStatus('skanowanie…');
    device=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:KNOWN_SVC});
    device.addEventListener('gattserverdisconnected',onDisc);
    sys('wybrano: '+(device.name||device.id)); $('#dev').style.display=''; $('#dev').textContent=device.name||'BLE';
    setStatus('łączenie…'); server=await device.gatt.connect();
    const pick=await pickChars(server);
    if(!pick){ errline('Brak pary write+notify. Prześlij listę serwisów z logu.'); setStatus('błąd char.','err'); return; }
    writeChar=pick.w; notifyChar=pick.n; svcUuid=pick.svc.uuid; adapterProfile=pick.profile;
    resetAdapterState();
    await notifyChar.startNotifications();
    notifyChar.addEventListener('characteristicvaluechanged',onNotify);
    sys(`profil: ${adapterProfile}`); sys(`svc=${svcUuid}`);
    sys(`write=${writeChar.uuid} (${writeChar.properties.writeWithoutResponse?'WWR':'WR'})  notify=${notifyChar.uuid}`);
    idbPut('exchange',{session:sessionId,seq:++seq,lvl:'META',ts_wall:wall(),
      device:device.name||device.id,profile:adapterProfile,service:svcUuid,write:writeChar.uuid,notify:notifyChar.uuid});
    setStatus('połączony','on'); connectedUI(true);
  }catch(e){ errline('connect: '+e.message); setStatus('rozłączony','err'); }
}
function onDisc(){
  setStatus('rozłączony','err'); connectedUI(false); sys('GATT rozłączony'); resetAdapterState();
  if(promptTimer){ clearTimeout(promptTimer); promptTimer=null; }
  if(inflight){
    const ex=inflight; inflight=null; ex.text=rxBuf; ex.status='DISCONNECTED'; rxBuf='';
    logExchange(ex);
    ex.resolve({cmd:ex.cmd,text:ex.text,status:'DISCONNECTED'});
  }
  while(queue.length){ const q=queue.shift(); q.resolve({cmd:q.cmd,text:'',status:'DISCONNECTED'}); }
  writeChar=notifyChar=server=null;
}
async function disconnect(){ try{ if(device&&device.gatt.connected) device.gatt.disconnect(); }catch(e){} }

function setStatus(t,c){ const el=$('#st'); el.textContent=t; el.className='status'+(c?' '+c:''); }
function setLogState(t,c){ const el=$('#logstate'); el.style.display=''; el.textContent=t; el.className='status'+(c?' '+c:''); }
let connected=false, macroRunning=false;
function connectedUI(on){ connected=on;
  $('#btnConn').disabled=on; $('#btnDisc').disabled=!on;
  refreshControls();
}
function busy(){ return !!inflight || queue.length>0 || macroRunning; }
function refreshControls(){
  const canAct=connected&&!macroRunning;
  document.querySelectorAll('button.macro').forEach(b=>b.disabled=!canAct);
  $('#btnSend').disabled=!canAct; $('#cmd').disabled=!canAct;
  // P1: nie pozwól zmienić sesji w trakcie wymiany/kolejki/makra (TX i RX trafiłyby do różnych sesji)
  $('#btnNewSess').disabled=busy();
  $('#btnDelSess').disabled=busy();
}

/* ---------------- walidacja payloadu Volvo ---------------- */
const VOLVO_READ_SERVICES=new Set(['A6','AE']);  // allowlist: read data / read DTC
function parseVolvoPayload(str){
  const toks=(str||'').trim().split(/\s+/).filter(Boolean).map(t=>t.toUpperCase());
  if(toks.length!==8) return {ok:false,msg:`Wymagane dokładnie 8 bajtów (jest ${toks.length}).`};
  if(!toks.every(t=>/^[0-9A-F]{2}$/.test(t))) return {ok:false,msg:'Każdy bajt = 2 znaki hex.'};
  const service=toks[2];
  if(!VOLVO_READ_SERVICES.has(service)) return {ok:false,msg:`Serwis ${service} spoza allowlisty (dozwolone tylko A6/AE — odczyt).`};
  return {ok:true, toks, addr:toks[1], service, pid:toks.slice(3).join(' '),
    byte0Verified:false,
    warning:'Semantyka byte0 nie jest potwierdzona dla XC70; brak blokującej walidacji bez reguły z RAW.',
    breakdown:`byte0=${toks[0]} (UNVERIFIED) addr=${toks[1]} svc=${toks[2]} pid=${toks.slice(3,5).join(' ')} …`};
}

/* ---------------- MAKRA + werdykty (odporne na puste wyniki) ---------------- */
function V(verdict,msg,detail){ return {verdict,msg,detail}; }
function okish(s){ return s==='OK'||s==='OK_DATA'; }
function find(r,cmd){ return r.find(x=>x&&x.cmd===cmd); }

const MACROS={
  A:{ note:'SETUP — identyfikacja + konfiguracja',
      cmds:()=>['ATZ','ATI','AT@1','ATE0','ATL0','ATS1','ATH1'],
      evaluate:r=>{
        if(!r.length) return V('INCONCLUSIVE','Brak wyników.');
        const id=r.find(x=>/ELM327/i.test(x.text||''));
        const setupCmds=['ATE0','ATL0','ATS1','ATH1'];
        const setupBad=setupCmds.map(c=>find(r,c)).filter(x=>x&&!okish(x.status));
        if(!id) return V('INCONCLUSIVE','Brak identyfikacji ELM327 — sprawdź log/połączenie.');
        if(setupBad.length) return V('INCONCLUSIVE','Adapter wykryty (IDENTITY_PASS), ale konfiguracja niepełna: '+setupBad.map(x=>x.cmd+'='+x.status).join(', '));
        return V('PASS','IDENTITY_PASS + SETUP_PASS.', (id.text||'').replace(/[\r>]/g,' ').trim()); }
  },
  B:{ note:'11-bit sanity — oczekiwane 41 00 z 7E8',
      cmds:()=>['ATE0','ATS1','ATH1','ATCAF1','ATSP6','0100','0120','010C'],   // self-sufficient także po C/CAF0
      evaluate:r=>{
        const setupCmds=['ATE0','ATS1','ATH1','ATCAF1','ATSP6'];
        const missing=setupCmds.filter(c=>!find(r,c));
        if(missing.length) return V('INCONCLUSIVE','Niepełny setup 11-bit — brak wyników: '+missing.join(', '));
        const setupBad=setupCmds.map(c=>find(r,c)).find(x=>!okish(x.status));
        if(setupBad) return V('FAIL',`SETUP_11BIT_NOT_CONFIRMED — ${setupBad.cmd}=${setupBad.status}.`);
        const q=find(r,'0100'); if(!q) return V('INCONCLUSIVE','Brak wyniku 0100.');
        if(/41\s*00/i.test(q.text||'')) return V('PASS','ECM odpowiada na standard OBD (11-bit).',(q.text||'').replace(/[\r>]/g,' ').trim());
        if(['NO_DATA','TIMEOUT','NO_CONNECT','DISCONNECTED'].includes(q.status)) return V('FAIL','Brak komunikacji standard OBD ('+q.status+'). Sprawdź zapłon / pin OBD / adapter zanim testujesz 29-bit.');
        return V('INCONCLUSIVE','Niejednoznaczna odpowiedź 0100: '+q.status); }
  },
  C:{ note:'29-bit — rozdzielone werdykty (AT != potwierdzenie transmisji CAN)',
      // self-sufficient: własny ATE0/ATS1/ATH1 (nie zależy od makra A).
      // BEZ ATCRA — audyt P0: ATCRA to JEDEN dokładny ID (bez wildcardu), '...FF' odfiltrowałby
      // prawidłową odpowiedź i dał sztuczne NO_DATA. W discovery: brak filtra, ATH1 pokazuje realne ID.
      cmds:()=>{
        const p=parseVolvoPayload($('#req29').value);
        const base=['ATE0','ATS1','ATH1','ATSP7','ATCRA','ATCAF0','ATAL','ATCP 00','ATSH 0F FF FE'];
        return p.ok? [...base, p.toks.join(' ')] : base;
      },
      evaluate:r=>{
        const setupCmds=['ATE0','ATS1','ATH1','ATSP7','ATCRA','ATCAF0','ATAL','ATCP 00','ATSH 0F FF FE'];
        const missing=setupCmds.filter(c=>!find(r,c));
        if(missing.length) return V('INCONCLUSIVE','Niepełny setup 29-bit — brak wyników: '+missing.join(', '));
        const setup=setupCmds.map(c=>find(r,c));
        const unsup=setup.find(x=>x.status==='AT_UNSUPPORTED');
        if(unsup) return V('FAIL',`COMMAND_SET_NOT_SUPPORTED — firmware odrzuca ${unsup.cmd} ("?"). To brak TEGO wariantu komendy, nie ostateczny brak 29-bit. Sprawdź nowszy firmware / inny adapter BLE z 29-bit.`);
        const setupBad=setup.find(x=>!okish(x.status));
        if(setupBad) return V('INCONCLUSIVE',`SETUP_NOT_CONFIRMED — ${setupBad.cmd}=${setupBad.status}. Nie wysuwam wniosku o pojeździe.`);
        const p=parseVolvoPayload($('#req29').value);
        if(!p.ok) return V('INCONCLUSIVE',`AT 29-bit przyjęte (COMMAND_SET_SUPPORTED), ale payload nie wysłany: ${p.msg} Wklej zweryfikowane 8 bajtów (serwis A6/AE) i powtórz.`);
        const req=r[r.length-1];
        if(!req) return V('INCONCLUSIVE','COMMAND_SET_SUPPORTED, brak wyniku requestu.');
        const match=matchVolvoResponse(req.text,p,req.meta);
        if(req.status==='OK_DATA' && match.positive)
          return V('PASS','VEHICLE_RESPONSE_PAYLOAD_CORRELATED — adres i usługa pasują do requestu wg hipotezy layoutu XC70; response CAN ID jest zaobserwowany, ale jeszcze niezweryfikowany dla P3.',`CAN_OBSERVED=${match.positive.canId} payload=${match.positive.payload.join(' ')} | ${p.warning}`);
        if(req.status==='NEGATIVE_RESPONSE' && match.negative)
          return V('PASS','VEHICLE_RESPONSE_PAYLOAD_CORRELATED — skorelowany negative response z ramką 29-bit; response CAN ID pozostaje niezweryfikowany dla P3.',`CAN_OBSERVED=${match.frames[0].canId} 7F ${req.meta.service} ${req.meta.nrc} ${req.meta.nrcName}`);
        if(match.frames.length)
          return V('INCONCLUSIVE','FRAME_OBSERVED — wykryto ramkę 29-bit, ale nie potwierdzono zgodności adresu/usługi z requestem. Nie awansuję do PASS.',match.frames.map(f=>f.raw).join(' | '));
        if(req.status==='OK_DATA' || req.status==='NEGATIVE_RESPONSE')
          return V('INCONCLUSIVE','Odpowiedź bez parsowalnego nagłówka 29-bit — możliwe echo, inny framing lub niezgodny adapter.',(req.text||'').replace(/[\r>]/g,' ').trim());
        return V('INCONCLUSIVE','COMMAND_SET_SUPPORTED, ale INCONCLUSIVE_FILTER_OR_ADDRESS — brak odpowiedzi ('+req.status+'). Możliwy zły adres/PID. NIE dowodzi braku 29-bit. Odpal Cross-check.'); }
  },
  X:{ note:'Cross-check — standard OBD na 29-bit (18DB33F1)',
      cmds:()=>['ATE0','ATS1','ATH1','ATSP7','ATCRA','ATCAF1','ATSH 18 DB 33 F1','0100'],
      evaluate:r=>{
        const setup=['ATE0','ATS1','ATH1','ATSP7','ATCRA','ATCAF1','ATSH 18 DB 33 F1'].map(c=>find(r,c)).filter(Boolean);
        const bad=setup.find(x=>!okish(x.status));
        if(bad) return V('FAIL',`Cross-check setup odrzucony: ${bad.cmd}=${bad.status}.`);
        const q=find(r,'0100');
        if(q && /41\s*00/i.test(q.text||'') && parseExtFrames(q.text).length) return V('PASS','Adapter obsługuje 29-bit: standard OBD odpowiedział z nagłówkiem rozszerzonym. Jeśli C=INCONCLUSIVE → problem w adresie/PID/formacie Volvo.');
        if(q && /41\s*00/i.test(q.text||'')) return V('INCONCLUSIVE','Jest 41 00, ale brak parsowalnego nagłówka 29-bit — sprawdź RAW/ATH1.');
        if(q && q.status==='AT_UNSUPPORTED') return V('FAIL','Adapter odrzuca konfigurację 29-bit.');
        return V('INCONCLUSIVE','Brak odpowiedzi na standard-OBD-29-bit — auto może nie wystawiać generic OBD na 29-bit. Rozstrzyga wtedy setup z makra C.'); }
  },
  Z:{ note:'CLEANUP', cmds:()=>['ATCAF1','ATCRA','ATSP0'],
      evaluate:r=>{ const bad=r.filter(x=>x&&!okish(x.status));
        return bad.length? V('INCONCLUSIVE','Cleanup częściowy — nie wszystkie komendy OK: '+bad.map(x=>x.cmd+'='+x.status).join(', '))
                         : V('PASS','Przywrócono auto-format / filtr / auto-protokół.'); }
  }
};
async function runMacro(key){
  if(!connected){ errline('makro wymaga połączenia'); return; }
  const m=MACROS[key]; if(!m) return;
  macroRunning=true; refreshControls();
  sys(`▶ MAKRO ${key}: ${m.note}`);
  const results=[];
  for(const c of m.cmds()){
    if(!writeChar){ errline('przerwano — brak połączenia'); break; }
    const res=await enqueue(c,/^ATZ/i.test(c)?3000:2500);
    results.push(res);
    if(res.status==='DISCONNECTED'){ errline('rozłączono w trakcie makra'); break; }
    await new Promise(r=>setTimeout(r,120));
  }
  const verdict=m.evaluate(results);
  renderVerdict(key,verdict,results);
  sys(`■ MAKRO ${key}: ${verdict.verdict}`);
  macroRunning=false; refreshControls();
}
function renderVerdict(key,v,results){
  const box=document.createElement('div'); box.className='v '+v.verdict;
  const errs=results.filter(r=>r&&['AT_UNSUPPORTED','NO_DATA','BUS_ERROR','TIMEOUT','WRITE_ERROR','DISCONNECTED','NEGATIVE_RESPONSE','BUFFER_FULL'].includes(r.status));
  box.innerHTML=`<b>MAKRO ${key}: ${v.verdict}</b><br>${esc(v.msg)}`
    +(v.detail?`<br><span style="color:var(--dim);font-family:var(--mono);font-size:11px">${esc(v.detail)}</span>`:'')
    +(errs.length?`<br><span style="color:var(--dim);font-size:11px">zdarzenia: ${errs.map(e=>e.cmd+'='+e.status).join(', ')}</span>`:'');
  verdictEl.appendChild(box); box.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

/* ---------------- sesje + eksport (wspólny seq, jedna sesja) ---------------- */
function newSession(){
  if(busy()){ errline('nie można zmienić sesji — trwa wymiana/kolejka/makro'); return; }
  sessionId=uuid(); seq=0; logErrors=0; logDegraded=false;
  sessionStartedWall=wall(); sessionStartedMono=mono();
  $('#sesslabel').textContent='sesja: '+sessionId.slice(0,8); $('#logstate').style.display='none';
  sys('── nowa sesja '+sessionId+' ──'); refreshControls(); }
async function exportCsv(){
  if(busy()){ errline('eksport dostępny po zakończeniu wymiany/kolejki/makra'); return; }
  await flushWrites();
  const chunks=await idbAllBySession('chunk',sessionId);
  const exch  =await idbAllBySession('exchange',sessionId);
  const rows=[];
  chunks.forEach(c=>rows.push({seq:c.seq,rec:['transport_chunk',c.seq,Math.round(c.ts_mono||0),c.ts_wall||'',c.dir||'',c.exchange_id??'',(c.text||'').replace(/\r/g,'\\r')+' | '+(c.bytes_hex||''),'']}));
  exch.forEach(e=>{ if(e.lvl==='EXCHANGE')
      rows.push({seq:e.seq,rec:['obd_exchange',e.seq,Math.round(e.ts_mono_end||0),e.ts_wall||'',e.status||'',e.exchange_id??'',(e.response_text||'').replace(/[\r\n]/g,'\\r'),e.adapter_state||'']});
    else rows.push({seq:e.seq,rec:[e.lvl||'SYS',e.seq,Math.round(e.ts_mono||0),e.ts_wall||'','','',e.text||JSON.stringify(e),'']}); });
  const manifest={schema:'xc70.capture_manifest.v1',session_id:sessionId,app_version:APP_VERSION,
    started_wall:sessionStartedWall,ended_wall:wall(),duration_ms:Math.round(mono()-sessionStartedMono),
    adapter:{name:device?(device.name||device.id):null,profile:adapterProfile,service_uuid:svcUuid},
    capture_scope:{transport:'ble',mode:'active-diagnostic-elm',bus:'selected-by-adapter',adapter_state:confirmedState},
    records:{transport_chunks:chunks.length,exchange_records:exch.length},
    dropped_count:null,dropped_count_note:'unknown — ELM/BLE nie udostępnia pełnego licznika dropów',
    log_degraded:logDegraded};
  rows.push({seq:-1,rec:['capture_manifest',-1,0,sessionStartedWall||'','','',JSON.stringify(manifest),'']});
  rows.sort((a,b)=>(a.seq??0)-(b.seq??0));                     // wspólny sequence number
  const head=['level','seq','ts_mono_ms','ts_wall','dir_or_status','exchange_id','text_or_hex','adapter_state'];
  const csv=[head,...rows.map(r=>r.rec)].map(r=>r.map(f=>`"${String(f).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='obd_'+sessionId.slice(0,8)+'_'+wall().replace(/[:.]/g,'-')+'.csv'; a.click(); URL.revokeObjectURL(url);
}

/* ---------------- UI ---------------- */
$('#btnConn').onclick=connect;
$('#btnDisc').onclick=disconnect;
$('#btnSend').onclick=()=>{ if(macroRunning){ errline('poczekaj — trwa makro'); return; } const v=$('#cmd').value.trim(); if(v){ enqueue(v); $('#cmd').value=''; } };
$('#cmd').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#btnSend').click(); }});
document.querySelectorAll('button.macro').forEach(b=>b.onclick=()=>runMacro(b.dataset.macro));
$('#btnClear').onclick=()=>{ logEl.innerHTML=''; };
$('#dlLog').onclick=e=>{ e.preventDefault(); exportCsv(); };
$('#btnNewSess').onclick=()=>newSession();
$('#btnDelSess').onclick=async()=>{
  if(busy()){ errline('nie można usunąć sesji — trwa wymiana/kolejka/makro'); return; }
  if(confirm('Usunąć zapisany log tej sesji z IndexedDB?')){
    const deleted=sessionId; await flushWrites(); await idbDeleteSession(deleted);
    newSession(); sys('usunięto poprzednią sesję '+deleted.slice(0,8));
  }
};

idbOpen().then(ok=>{
  newSession();
  sys('Volvo OBD Console v'+APP_VERSION+' — mobile discovery tool. '+(ok?'log→IndexedDB aktywny.':'IndexedDB niedostępny (log tylko w widoku).'));
  sys('Zalecana kolejność: A → B → C. Werdykt 29-bit czytaj z banera makra C (COMMAND_SET_SUPPORTED / FRAME_OBSERVED / VEHICLE_RESPONSE_PAYLOAD_CORRELATED).');
  sys('Volvo payload = EKSPERYMENTALNY: adres/serwis/PID NIEpotwierdzone dla XC70 T6. Użyj tylko definicji z RAW potwierdzonym na tym aucie; dane Tigo2000 dotyczą innego Volvo.');
  if(!navigator.bluetooth) errline('navigator.bluetooth niedostępny — Android=Chrome, iOS=Bluefy, https wymagane.');
});
